<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Game Score Tracker</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      padding-bottom: 100px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      color: white;
      text-align: center;
      margin-bottom: 20px;
      font-size: 28px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }

    input[type="number"] {
      width: 80px;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      text-align: center;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
    }

    button:active {
      transform: scale(0.98);
    }

    button:hover {
      background: #5568d3;
    }

    button.secondary {
      background: #f0f0f0;
      color: #333;
    }

    button.secondary:hover {
      background: #e0e0e0;
    }

    button.danger {
      background: #ff4757;
    }

    button.danger:hover {
      background: #ff3344;
    }

    .player-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .player-card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .player-info {
      flex: 1;
    }

    .player-name {
      font-weight: 600;
      font-size: 18px;
      color: #333;
      margin-bottom: 4px;
    }

    .player-score {
      font-size: 24px;
      font-weight: 700;
      color: #667eea;
    }

    .player-actions {
      display: flex;
      gap: 8px;
    }

    .player-actions button {
      padding: 8px 12px;
      font-size: 14px;
    }

    .score-input-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .score-input-group input {
      width: 70px;
      padding: 8px;
      font-size: 14px;
    }

    .score-input-group button {
      padding: 8px 16px;
      font-size: 14px;
    }

    .total-section {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
    }

    .total-label {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 8px;
    }

    .total-value {
      font-size: 48px;
      font-weight: 700;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }

    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .player-header h2 {
      font-size: 18px;
      color: #333;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
        padding-bottom: 80px;
      }

      h1 {
        font-size: 24px;
      }

      .player-card {
        flex-direction: column;
        align-items: stretch;
      }

      .player-actions {
        justify-content: flex-end;
      }

      .total-value {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 Game Score Tracker</h1>

    <!-- Add Player Section -->
    <div class="card">
      <div class="input-group">
        <input 
          type="text" 
          id="playerNameInput" 
          placeholder="Enter player name..."
          autocomplete="off"
        >
        <button onclick="addPlayer()">Add Player</button>
      </div>
    </div>

    <!-- Players List -->
    <div class="card">
      <div class="player-header">
        <h2>Players</h2>
        <button class="secondary" onclick="clearAllPlayers()" style="font-size: 12px; padding: 6px 12px;">Clear All</button>
      </div>
      <div id="playerList" class="player-list">
        <!-- Players will be rendered here -->
      </div>
    </div>

    <!-- Total Score -->
    <div class="card total-section">
      <div class="total-label">Running Total</div>
      <div class="total-value" id="totalScore">0</div>
    </div>

    <div class="actions">
      <button class="secondary" onclick="resetAllScores()">Reset Scores</button>
    </div>
  </div>

  <script>
    // State
    let players = [];

    // Load from localStorage on mount
    function loadPlayers() {
      const saved = localStorage.getItem('gameScorePlayers');
      if (saved) {
        players = JSON.parse(saved);
      }
      render();
    }

    // Save to localStorage
    function savePlayers() {
      localStorage.setItem('gameScorePlayers', JSON.stringify(players));
    }

    // Add a new player
    function addPlayer() {
      const input = document.getElementById('playerNameInput');
      const name = input.value.trim();
      
      if (!name) {
        alert('Please enter a player name');
        return;
      }

      const player = {
        id: Date.now(),
        name: name,
        score: 0
      };

      players.push(player);
      savePlayers();
      render();
      
      input.value = '';
      input.focus();
    }

    // Remove a player
    function removePlayer(id) {
      if (confirm('Remove this player?')) {
        players = players.filter(p => p.id !== id);
        savePlayers();
        render();
      }
    }

    // Add score to a player
    function addScore(id) {
      const input = document.getElementById(`score-input-${id}`);
      const points = parseInt(input.value);
      
      if (isNaN(points) || points < 0) {
        alert('Please enter a valid positive number');
        return;
      }

      const player = players.find(p => p.id === id);
      if (player) {
        player.score += points;
        savePlayers();
        render();
      }
    }

    // Reset a player's score
    function resetScore(id) {
      const player = players.find(p => p.id === id);
      if (player) {
        if (confirm(`Reset ${player.name}'s score to 0?`)) {
          player.score = 0;
          savePlayers();
          render();
        }
      }
    }

    // Reset all scores
    function resetAllScores() {
      if (confirm('Reset all scores to 0?')) {
        players.forEach(p => p.score = 0);
        savePlayers();
        render();
      }
    }

    // Clear all players
    function clearAllPlayers() {
      if (confirm('Remove all players? This cannot be undone.')) {
        players = [];
        savePlayers();
        render();
      }
    }

    // Calculate total score
    function calculateTotal() {
      return players.reduce((sum, p) => sum + p.score, 0);
    }

    // Render the player list
    function render() {
      const container = document.getElementById('playerList');
      
      if (players.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🎯</div>
            <p>No players yet. Add some players to start tracking scores!</p>
          </div>
        `;
      } else {
        container.innerHTML = players.map(player => `
          <div class="player-card">
            <div class="player-info">
              <div class="player-name">${escapeHtml(player.name)}</div>
              <div class="player-score">${player.score} points</div>
            </div>
            <div class="player-actions">
              <div class="score-input-group">
                <input 
                  type="number" 
                  id="score-input-${player.id}" 
                  placeholder="+0"
                  min="0"
                  onkeydown="if(event.key==='Enter')addScore(${player.id})"
                >
                <button onclick="addScore(${player.id})">Add</button>
              </div>
              <button class="secondary" onclick="resetScore(${player.id})">Reset</button>
              <button class="danger" onclick="removePlayer(${player.id})">✕</button>
            </div>
          </div>
        `).join('');
      }

      // Update total
      document.getElementById('totalScore').textContent = calculateTotal().toLocaleString();
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Handle Enter key on player name input
    document.getElementById('playerNameInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        addPlayer();
      }
    });

    // Initialize
    loadPlayers();
  </script>
</body>
</html>
